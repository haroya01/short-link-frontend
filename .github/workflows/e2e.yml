name: E2E

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  preflight:
    runs-on: ubuntu-latest
    outputs:
      ready: ${{ steps.check.outputs.ready }}
    steps:
      - id: check
        env:
          HAS_SUB_TOKEN: ${{ secrets.SUB_TOKEN != '' }}
        run: |
          if [ "$HAS_SUB_TOKEN" = "true" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::SUB_TOKEN secret not set on this repo; skipping e2e. See e2e/README.md for setup."
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

  e2e:
    needs: preflight
    if: needs.preflight.outputs.ready == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      BACKEND_URL: http://localhost:8080
      PLAYWRIGHT_BASE_URL: http://localhost:3001
      SPRING_PROFILES_ACTIVE: test
      DB_URL: jdbc:mysql://localhost:3306/short_link?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      DB_USERNAME: short_link
      DB_PASSWORD: ${{ secrets.E2E_DB_PASSWORD || 'haroya0117!' }}
      REDIS_HOST: localhost
      REDIS_PORT: '6379'
      REDIS_PASSWORD: ${{ secrets.E2E_REDIS_PASSWORD || 'haroya0117!' }}
      SHORT_LINK_BASE_URL: http://localhost:8080
      SHORT_LINK_FRONTEND_BASE_URL: http://localhost:3001
      SAFE_BROWSING_ENABLED: 'false'
      JWT_PRIVATE_KEY: ${{ secrets.E2E_JWT_PRIVATE_KEY }}
      JWT_PUBLIC_KEY: ${{ secrets.E2E_JWT_PUBLIC_KEY }}
    steps:
      - name: Checkout frontend
        uses: actions/checkout@v4
        with:
          path: frontend

      - name: Checkout backend
        uses: actions/checkout@v4
        with:
          repository: haroya01/short-link
          path: backend
          submodules: recursive
          token: ${{ secrets.SUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('backend/**/*.gradle*', 'backend/**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Start backing services
        working-directory: backend
        run: docker compose -f resources/docker-compose.yml up -d

      - name: Generate ephemeral JWT keypair if not provided
        if: env.JWT_PRIVATE_KEY == ''
        run: |
          openssl genpkey -algorithm RSA -out /tmp/jwt-private.pem -pkeyopt rsa_keygen_bits:2048
          openssl rsa -pubout -in /tmp/jwt-private.pem -out /tmp/jwt-public.pem
          {
            echo "JWT_PRIVATE_KEY<<EOF"
            cat /tmp/jwt-private.pem
            echo EOF
            echo "JWT_PUBLIC_KEY<<EOF"
            cat /tmp/jwt-public.pem
            echo EOF
          } >> "$GITHUB_ENV"

      - name: Wait for MySQL
        working-directory: backend
        run: |
          for i in {1..30}; do
            if docker exec short-link-mysql mysqladmin ping -h localhost -u short_link -p"$DB_PASSWORD" --silent 2>/dev/null; then
              echo "MySQL ready"
              exit 0
            fi
            sleep 2
          done
          docker compose -f resources/docker-compose.yml logs
          exit 1

      - name: Boot backend
        working-directory: backend
        run: |
          ./gradlew bootJar -x test --no-daemon
          nohup java -jar build/libs/*.jar > /tmp/backend.log 2>&1 &
          for i in {1..60}; do
            if curl -fs http://localhost:8080/actuator/health >/dev/null; then
              echo "backend up"
              exit 0
            fi
            sleep 2
          done
          echo "backend failed to start"
          cat /tmp/backend.log
          exit 1

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Start frontend
        working-directory: frontend
        run: |
          nohup npm start > /tmp/frontend.log 2>&1 &
          for i in {1..30}; do
            if curl -fs http://localhost:3001 >/dev/null; then
              echo "frontend up"
              exit 0
            fi
            sleep 2
          done
          echo "frontend failed to start"
          cat /tmp/frontend.log
          exit 1

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run Playwright
        working-directory: frontend
        run: npx playwright test
        env:
          CI: 'true'

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report
          retention-days: 7

      - name: Tail logs on failure
        if: failure()
        run: |
          echo "--- backend ---"
          tail -200 /tmp/backend.log || true
          echo "--- frontend ---"
          tail -200 /tmp/frontend.log || true
